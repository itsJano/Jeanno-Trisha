<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeanno & Trisha</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: #ffffff;
    color: #1d1d1f;
}

/* SECTIONS */
.section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
}

/* HERO */
.hero h1 {
    font-size: 72px;
    font-weight: 500;
    letter-spacing: -1px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s ease forwards;
}

.hero p {
    margin-top: 10px;
    font-size: 22px;
    color: #6e6e73;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1.5s ease forwards;
}

/* LARGE TEXT SECTIONS */
.big-text {
    font-size: 56px;
    font-weight: 500;
    max-width: 800px;
    line-height: 1.2;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s ease;
}

.big-text.visible {
    opacity: 1;
    transform: translateY(0);
}

/* DETAILS */
.details p {
    font-size: 20px;
    margin: 8px 0;
    color: #6e6e73;
}

/* RSVP */
.rsvp {
    width: 100%;
    max-width: 400px;
}

input, select {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #d2d2d7;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #1d1d1f;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #333;
}

/* ANIMATION */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* FOOTER */
.footer {
    font-size: 14px;
    color: #86868b;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="section hero">
    <h1>Jeanno & Trisha</h1>
    <p>December 20, 2026</p>
</section>

<!-- STORY / MESSAGE -->
<section class="section">
    <div class="big-text">We’re getting married.</div>
</section>

<section class="section">
    <div class="big-text">And we’d love for you to be part of it.</div>
</section>

<!-- DETAILS -->
<section class="section details">
    <div class="big-text">Save the date.</div>
    <p>December 20, 2026</p>
    <p>3:00 PM</p>
    <p>Your Venue Here</p>
</section>

<!-- RSVP -->
<section class="section">
    <div class="big-text">RSVP</div>

    <form class="rsvp" id="rsvpForm">
        <input type="text" placeholder="Full Name" required>
        
        <select required>
            <option value="">Will you attend?</option>
            <option>Yes, I will be there</option>
            <option>Sorry, can't make it</option>
        </select>

        <input type="number" placeholder="Guests">

        <button type="submit">Submit</button>
    </form>

    <p id="responseMsg"></p>
</section>

<!-- FOOTER -->
<section class="section footer">
    <p>Designed with love.</p>
</section>

<script>
// SCROLL ANIMATION
const texts = document.querySelectorAll(".big-text");

window.addEventListener("scroll", () => {
    texts.forEach(text => {
        const top = text.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            text.classList.add("visible");
        }
    });
});

// RSVP (placeholder)
document.getElementById("rsvpForm").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("responseMsg").innerText = "Thank you. We’ll see you there.";
});
</script>

</body>
</html>
