<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeanno & Trisha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f8f6f2;
    color: #333;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 400;
    margin-bottom: 30px;
}

.section {
    margin: 60px 0;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: #c5a880;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.countdown {
    font-size: 24px;
    margin-top: 10px;
}

.footer {
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<div class="container">

    <!-- HERO -->
    <h1>Jeanno & Trisha</h1>
    <h2>We're getting married 💍</h2>
    <p>December 20, 2026</p>

    <!-- COUNTDOWN -->
    <div class="section">
        <div class="card">
            <h2>Countdown</h2>
            <div class="countdown" id="countdown"></div>
        </div>
    </div>

    <!-- EVENT DETAILS -->
    <div class="section">
        <div class="card">
            <h2>Wedding Details</h2>
            <p><strong>Venue:</strong> Your Venue Here</p>
            <p><strong>Time:</strong> 3:00 PM</p>
            <p><strong>Dress Code:</strong> Formal / Elegant</p>
        </div>
    </div>

    <!-- RSVP -->
    <div class="section">
        <div class="card">
            <h2>RSVP</h2>

            <form id="rsvpForm">
                <input type="text" placeholder="Full Name" required>
                
                <select required>
                    <option value="">Will you attend?</option>
                    <option>Yes, I will be there</option>
                    <option>Sorry, can't make it</option>
                </select>

                <input type="number" placeholder="Number of Guests" min="1">

                <input type="text" placeholder="Message (optional)">

                <button type="submit">Submit RSVP</button>
            </form>

            <p id="responseMsg"></p>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Made with love for our special day
    </div>

</div>

<script>
// Countdown
const countdown = document.getElementById("countdown");
const weddingDate = new Date("December 20, 2026 15:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const gap = weddingDate - now;

    const days = Math.floor(gap / (1000 * 60 * 60 * 24));
    const hours = Math.floor((gap / (1000 * 60 * 60)) % 24);

    countdown.innerHTML = days + " days " + hours + " hours left";
}, 1000);

// Fake RSVP submission (replace later with real backend)
document.getElementById("rsvpForm").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("responseMsg").innerText = "Thank you! Your RSVP has been received 💖";
});
</script>

</body>
</html>
